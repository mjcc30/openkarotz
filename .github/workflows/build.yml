name: Karotz Open Firmware CI/CD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  ARTIFACT_NAME: karotz-open-firmware
  BUILD_DIR: output

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget curl gcc g++ make \
            bison flex libtool autoconf automake python3 texinfo \
            libncurses5-dev libncursesw5-dev libssl-dev zlib1g-dev gawk \
            unzip zip quilt ccache rsync bc genisoimage qemu-utils

      - name: Cache toolchain and sources
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.BUILD_DIR }}/toolchain
            ${{ env.BUILD_DIR }}/sources
            ~/.cache/ccache
          key: ${{ runner.os }}-build-${{ hashFiles('build-scripts/**') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build all
        run: |
          chmod -R +x build-scripts/
          ./build-scripts/build_all.sh fast
        timeout-minutes: 300

      - name: Verify checksums
        run: |
          ./build-scripts/verification/verify_checksums.sh verify

      - name: Package firmware
        run: |
          ./build-scripts/package_firmware.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ github.sha }}
          path: |
            ${{ env.BUILD_DIR }}/firmware/
            ${{ env.BUILD_DIR }}/package/
          retention-days: 7

      - name: Run tests
        run: |
          chmod +x tests/*.sh
          ./tests/verify_artifacts.sh
          ./tests/verify_checksums.sh
          ./tests/verify_structure.sh

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ github.sha }}
          path: ${{ env.BUILD_DIR }}

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.BUILD_DIR }}/package/*
            ${{ env.BUILD_DIR }}/firmware/checksums.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
